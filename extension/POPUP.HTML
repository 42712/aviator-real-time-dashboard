<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      background: #03060c;
      color: #c8e0f5;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #00e5ff;
      font-size: 18px;
      margin: 0 0 10px;
      text-align: center;
    }
    .status {
      background: #070f1a;
      border: 1px solid #102030;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
    .label {
      color: #3a6a8a;
    }
    .value {
      color: #00e676;
      font-weight: bold;
    }
    .button {
      background: #00b8d4;
      color: #000;
      border: none;
      padding: 8px;
      width: 100%;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }
    .button:hover {
      filter: brightness(1.2);
    }
    .footer {
      font-size: 11px;
      color: #3a6a8a;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>MEGATRON v4.2</h1>
  
  <div class="status">
    <div class="status-item">
      <span class="label">Status:</span>
      <span class="value" id="status">Ativo</span>
    </div>
    <div class="status-item">
      <span class="label">Última vela:</span>
      <span class="value" id="ultima">—</span>
    </div>
    <div class="status-item">
      <span class="label">Servidor:</span>
      <span class="value" id="servidor">Conectando...</span>
    </div>
  </div>
  
  <button class="button" id="abrirPainel">ABRIR PAINEL WEB</button>
  <button class="button" id="testar">TESTAR CAPTURA</button>
  
  <div class="footer">
    ⚡ Capturando em tempo real
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
